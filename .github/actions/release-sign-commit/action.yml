name: SSH-signed release commit, tag, and GitHub release
description: >-
  Owns the version/sign/tag/push/release mechanics of the conventional-commit
  release pattern used by opencode-plugins, pi-extensions, caxton, and
  auto_review's release-prepare + release-publish workflows: compute the next
  version, create an SSH-signed commit and tag, push, and create a GitHub
  release with `gh release create`. It does not run any language-specific
  build or publish command -- each consuming repo's own workflow supplies
  that separately, using the `new-version`/`tag-name` outputs.
  Boolean inputs let one consuming repo call this action twice (once from its
  own release-prepare workflow, once from its own release-publish workflow)
  and select which mechanics run each time.

inputs:
  release-signing-key:
    description: SSH private key used to sign the release commit and tag.
    required: true
  release-signing-name:
    description: Git author/committer name for the signed commit/tag.
    required: true
  release-signing-email:
    description: Git author/committer email for the signed commit/tag.
    required: true
  github-token:
    description: >-
      Token used by `gh release create`. Supply this from a
      create-github-app-token step using the org GitHub App.
    required: true
  working-directory:
    description: Directory to operate in, for repos where the release target isn't the repo root.
    required: false
    default: "."
  tag-prefix:
    description: Prefix prepended to the computed version to form the git tag (e.g. "v" -> "v1.2.3").
    required: false
    default: "v"
  version-override:
    description: >-
      Use this exact version instead of computing one from conventional
      commits. Set this when a consumer's own build step (e.g. Changesets, a
      mix.exs bump script) already determined the version.
    required: false
    default: ""
  bump:
    description: >-
      Force the computed bump level instead of deriving it from conventional
      commits. One of "auto", "major", "minor", "patch". Ignored when
      version-override is set.
    required: false
    default: "auto"
  create-commit:
    description: >-
      Commit whatever is currently modified in the working tree (signed).
      Set to "false" in a publish-phase invocation that only needs to tag an
      already-merged, already-signed commit.
    required: false
    default: "true"
  commit-message:
    description: >-
      Commit message for the release commit. "{tag}" and "{version}" are
      substituted. Defaults to "chore(release): {tag}".
    required: false
    default: ""
  create-tag:
    description: Create a signed git tag for the release.
    required: false
    default: "true"
  push:
    description: Push the current branch (if a commit was created) and the tag to origin.
    required: false
    default: "true"
  create-release:
    description: Create a GitHub release for the tag via `gh release create`.
    required: false
    default: "true"
  release-notes:
    description: >-
      Release notes body. Defaults to an auto-generated list of commit
      subjects since the previous tag.
    required: false
    default: ""
  draft:
    description: Create the GitHub release as a draft.
    required: false
    default: "false"
  prerelease:
    description: Mark the GitHub release as a prerelease.
    required: false
    default: "false"

outputs:
  new-version:
    description: The computed (or overridden) release version, without the tag prefix (e.g. "1.2.3").
    value: ${{ steps.version.outputs.new-version }}
  tag-name:
    description: The git tag created for the release (e.g. "v1.2.3").
    value: ${{ steps.version.outputs.tag-name }}
  previous-tag:
    description: The most recent pre-existing tag matching tag-prefix, if any.
    value: ${{ steps.version.outputs.previous-tag }}
  release-url:
    description: URL of the GitHub release that was created, if create-release was true.
    value: ${{ steps.release.outputs.release-url }}

runs:
  using: composite
  steps:
    - name: Configure signing identity
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RELEASE_SIGNING_KEY: ${{ inputs.release-signing-key }}
        RELEASE_SIGNING_NAME: ${{ inputs.release-signing-name }}
        RELEASE_SIGNING_EMAIL: ${{ inputs.release-signing-email }}
      run: |
        set -euo pipefail
        if [ -z "$RELEASE_SIGNING_KEY" ]; then
          echo "release-signing-key input is required" >&2
          exit 1
        fi
        signing_key_path="${RUNNER_TEMP:-/tmp}/release-sign-commit-key"
        printf '%s\n' "$RELEASE_SIGNING_KEY" > "$signing_key_path"
        chmod 600 "$signing_key_path"
        git config --global gpg.format ssh
        git config --global user.signingkey "$signing_key_path"
        git config --global commit.gpgsign true
        git config --global tag.gpgsign true
        git config --global user.name "$RELEASE_SIGNING_NAME"
        git config --global user.email "$RELEASE_SIGNING_EMAIL"
        {
          echo "GIT_AUTHOR_NAME=$RELEASE_SIGNING_NAME"
          echo "GIT_AUTHOR_EMAIL=$RELEASE_SIGNING_EMAIL"
          echo "GIT_COMMITTER_NAME=$RELEASE_SIGNING_NAME"
          echo "GIT_COMMITTER_EMAIL=$RELEASE_SIGNING_EMAIL"
        } >> "$GITHUB_ENV"

    - name: Compute release version
      id: version
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TAG_PREFIX: ${{ inputs.tag-prefix }}
        VERSION_OVERRIDE: ${{ inputs.version-override }}
        BUMP: ${{ inputs.bump }}
      run: |
        set -euo pipefail
        git fetch --tags --force origin >/dev/null 2>&1 || true

        previous_tag="$(git tag -l "${TAG_PREFIX}*" | sort -V | tail -n1)"
        previous_version="${previous_tag#"$TAG_PREFIX"}"

        if [ -n "$VERSION_OVERRIDE" ]; then
          new_version="$VERSION_OVERRIDE"
        else
          if [ -z "$previous_version" ]; then
            major=0; minor=0; patch=0
            range=""
          else
            IFS='.' read -r major minor patch <<< "$previous_version"
            range="${previous_tag}..HEAD"
          fi

          level="$BUMP"
          if [ "$level" = "auto" ]; then
            level=patch
            if [ -z "$previous_version" ]; then
              level=minor
            fi
            subjects="$(git log --no-show-signature --format='%s%n%b' $range 2>/dev/null || true)"
            if printf '%s' "$subjects" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:|BREAKING CHANGE'; then
              level=major
            elif printf '%s' "$subjects" | grep -qE '^feat(\([^)]*\))?:'; then
              level=minor
            fi
          fi

          case "$level" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *)
              echo "bump must be one of auto, major, minor, patch (got: $level)" >&2
              exit 1
              ;;
          esac
          new_version="${major}.${minor}.${patch}"
        fi

        tag_name="${TAG_PREFIX}${new_version}"
        echo "computed release version: $new_version (tag: $tag_name, previous tag: ${previous_tag:-none})"
        echo "new-version=$new_version" >> "$GITHUB_OUTPUT"
        echo "tag-name=$tag_name" >> "$GITHUB_OUTPUT"
        echo "previous-tag=$previous_tag" >> "$GITHUB_OUTPUT"

    - name: Create signed release commit
      if: inputs.create-commit == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TAG_NAME: ${{ steps.version.outputs.tag-name }}
        NEW_VERSION: ${{ steps.version.outputs.new-version }}
        COMMIT_MESSAGE_TEMPLATE: ${{ inputs.commit-message }}
      run: |
        set -euo pipefail
        if [ -z "$(git status --porcelain)" ]; then
          echo "no working-tree changes to commit; leaving HEAD as-is"
          exit 0
        fi
        template="${COMMIT_MESSAGE_TEMPLATE:-chore(release): {tag}}"
        message="${template//\{tag\}/$TAG_NAME}"
        message="${message//\{version\}/$NEW_VERSION}"
        git add -A
        git commit -S -m "$message"
        if ! git cat-file commit HEAD | grep -q '^gpgsig '; then
          echo "release commit was not signed" >&2
          exit 1
        fi

    - name: Create signed release tag
      if: inputs.create-tag == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TAG_NAME: ${{ steps.version.outputs.tag-name }}
      run: |
        set -euo pipefail
        if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
          echo "tag $TAG_NAME already exists; leaving it as-is"
        else
          git tag -s "$TAG_NAME" -m "$TAG_NAME"
        fi

    - name: Push commit and tag
      if: inputs.push == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TAG_NAME: ${{ steps.version.outputs.tag-name }}
        CREATE_COMMIT: ${{ inputs.create-commit }}
      run: |
        set -euo pipefail
        if [ "$CREATE_COMMIT" = "true" ]; then
          branch="$(git branch --show-current)"
          if [ -z "$branch" ]; then
            echo "HEAD is detached; check out a branch before calling this action with create-commit: true" >&2
            exit 1
          fi
          git push origin "HEAD:refs/heads/$branch"
        fi
        if [ "${{ inputs.create-tag }}" = "true" ]; then
          git push origin "refs/tags/$TAG_NAME"
        fi

    - name: Create GitHub release
      if: inputs.create-release == 'true'
      id: release
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TAG_NAME: ${{ steps.version.outputs.tag-name }}
        PREVIOUS_TAG: ${{ steps.version.outputs.previous-tag }}
        RELEASE_NOTES: ${{ inputs.release-notes }}
        DRAFT: ${{ inputs.draft }}
        PRERELEASE: ${{ inputs.prerelease }}
      run: |
        set -euo pipefail
        notes="$RELEASE_NOTES"
        if [ -z "$notes" ]; then
          if [ -n "$PREVIOUS_TAG" ]; then
            notes="$(git log --no-show-signature --format='- %s (%h)' "${PREVIOUS_TAG}..${TAG_NAME}")"
          else
            notes="$(git log --no-show-signature --format='- %s (%h)' "$TAG_NAME")"
          fi
          if [ -z "$notes" ]; then
            notes="Release $TAG_NAME."
          fi
        fi

        args=(release create "$TAG_NAME" --title "$TAG_NAME" --notes "$notes" --target "$(git rev-parse HEAD)")
        if [ "$DRAFT" = "true" ]; then
          args+=(--draft)
        fi
        if [ "$PRERELEASE" = "true" ]; then
          args+=(--prerelease)
        fi

        gh "${args[@]}"
        release_url="$(gh release view "$TAG_NAME" --json url --jq .url)"
        echo "release-url=$release_url" >> "$GITHUB_OUTPUT"
